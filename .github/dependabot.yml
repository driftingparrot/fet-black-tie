version: 2
updates:
  # Enable version updates for npm packages
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    allow:
      - dependency-type: "direct"
    rebase-strategy: "auto"
    versioning-strategy: "auto"
    groups:
      development-dependencies:
        patterns:
          - "@commitlint/*"
          - "@tailwindcss/*"
          - "@types/*"
          - "husky"
          - "lint-staged"
          - "oxfmt"
          - "oxlint"
          - "tailwindcss"
          - "typescript"
      production-dependencies:
        exclude-patterns:
          - "@commitlint/*"
          - "@tailwindcss/*"
          - "@types/*"
          - "husky"
          - "lint-staged"
          - "oxfmt"
          - "oxlint"
          - "tailwindcss"
          - "typescript"
